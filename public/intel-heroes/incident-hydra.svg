<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Russian-language drug market, seized. — $5B HYDRA MARKET · APR 2022">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0b0d"/>
      <stop offset="1" stop-color="#06060a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fb91f"/>
      <stop offset="1" stop-color="#1fa8e0"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0 L0 0 0 80" fill="none" stroke="#1a1a1f" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.55"/>

  <g opacity="0.06" fill="#5fb91f">
    <rect y="180" width="1920" height="1"/>
    <rect y="540" width="1920" height="1"/>
    <rect y="900" width="1920" height="1"/>
  </g>

  <rect x="120" y="120" width="4" height="840" fill="url(#accent)"/>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="26" letter-spacing="6">
    <text x="160" y="160" fill="#5fb91f">▸ INCIDENT · DARKNET</text>
  </g>
  
  <g transform="translate(1530 130)">
    <rect width="260" height="48" rx="2" fill="none" stroke="#5fb91f" stroke-width="1.5"/>
    <text x="130" y="32" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="22" letter-spacing="6" fill="#5fb91f" text-anchor="middle">SEIZURE</text>
  </g>

  <g font-family="Georgia,'Times New Roman',serif" font-weight="700">
    <text x="160" y="500" font-size="380" fill="#ffffff" letter-spacing="-12">$5B</text>
  </g>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" letter-spacing="4">
    <text x="160" y="570" font-size="32" fill="#9ca3af">HYDRA MARKET · APR 2022</text>
  </g>

  <line x1="160" y1="640" x2="900" y2="640" stroke="#5fb91f" stroke-width="2" opacity="0.4"/>

  <g font-family="Georgia,'Times New Roman',serif" font-weight="600" fill="#ffffff">
    <text x="160" y="760" font-size="68">Russian-language drug market, seized.</text>
  </g>
  <g font-family="Georgia,'Times New Roman',serif" font-weight="400" fill="#9ca3af">
    <text x="160" y="830" font-size="44">DOJ + BKA joint takedown. Six years of operation, hundreds</text>
    <text x="160" y="886" font-size="44">of vendors, $5B in lifetime crypto volume.</text>
  </g>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="22" letter-spacing="4">
    <text x="160" y="985" fill="#5fb91f">REX INTEL SERVICES</text>
    <text x="160" y="1020" fill="#6b7280">BKA / DOJ joint operation</text>
  </g>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="20" letter-spacing="3" fill="#3a3a42">
    <text x="1760" y="1020" text-anchor="end">rex-intel-services</text>
  </g>
</svg>
